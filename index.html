<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      height: 100vh;
      width: 100vw;
      position: relative;
      padding: 0;
      margin: 0;
      touch-action: none;
      overflow: hidden;
    }
    html {
      overflow: hidden;
    }
    button {
      padding: 8px;
      border: 2px solid black;
      border-radius: 5px;
      cursor: pointer;
      margin: 3px;
      font-size: 1.5em;
      color: black;
    }
    @media (max-width: 800px) {
      button {
        font-size: 1em;
      }
    }
    .content-item {
      position: absolute;
      cursor: grab;
      user-select: none;
      -webkit-touch-callout: none;
      outline: 2px solid black;
    }
    .toolbar {
      position: fixed;
      height: min-content;
      width: 100%;
      display: flex;
      justify-content: center;
      pointer-events: none;
      z-index: 1;
    }
    .toolbar * {
      pointer-events: all;
    }
    .content-area {
      position: relative;
      width: 100%;
      height: 100%;
    }
    .root {
      height: 100%;
      width: 100%;
    }
    .focused {
      border: none;
      outline: 3px solid blue;
    }
    .grabbing {
      cursor: grabbing;
    }
  </style>
  <body>
    <div class="root">
      <div class="toolbar">
        <button id="paste-btn">paste</button>
        <button id="add-txt-btn">add text</button>
        <button id="add-black-box">add black box</button>
      </div>
      <div class="content-area"></div>
    </div>
  </body>
  <script>
    const content_area = document.querySelector(".content-area");
    let focused_item = null;
    let grabbed_item = null;
    let focused_point_info = null;
    let contentAreaMatrix = new DOMMatrix();
    let pointerDownEvents = [];
    function unfocus(e) {
      if (e.target !== focused_item) {
        if (focused_item) {
          focused_item.classList.remove("focused");
        }
        focused_item = null;
        grabbed_item = null;
        focused_point_info = null;
      }
    }
    function setFocusedItem(e) {
      if (e.target.classList.contains("content-item")) {
        unfocus(e);
        const node = e.target.parentNode.removeChild(e.target);
        content_area.appendChild(node);
        focused_item = e.target;
        grabbed_item = focused_item;
        focused_item.classList.add("focused");
        grabbed_item.classList.add("grabbing");
        let bbox = e.target.getBoundingClientRect();
        focused_point_info = { x: bbox.x, y: bbox.y, eventX: e.clientX, eventY: e.clientY };
      }
    }
    function pointerDownHandler(e) {
      pointerDownEvents.push(e);
    }
    function moveGrabbedItem(e) {
      if (focused_point_info === null || grabbed_item === null) {
        return;
      }
      // need content_area_bbox to be used as an origin point
      let content_area_bbox = content_area.getBoundingClientRect();
      let { x, y, eventX, eventY } = focused_point_info;
      let diff_x = x - eventX;
      let diff_y = y - eventY;
      // converting the e.client[X|Y] values to
      // points on the scaled content_area DOM element
      // cartesian plane and dividing by the scale amount
      // to make sure movements are normalized to behave
      // as if there was no scaling

      // this is the scaleX; also scaleY must be the same
      let content_area_scale = contentAreaMatrix.a;
      grabbed_item.style.transform = `
        translate(
          ${(e.clientX - content_area_bbox.x + diff_x) / content_area_scale}px,
          ${(e.clientY - content_area_bbox.y + diff_y) / content_area_scale}px
        )
        `;
    }
    function pointerMoveHandler(e) {
      moveGrabbedItem(e);
      // if (pointerDownEvents.length === 2) {
      //   const index = pointerDownEvents.findIndex((evt) => evt.pointerId === e.pointerId);
      //   pointerDownEvents[index] = e;
      //   const diff = Math.hypot(
      //     pointerDownEvents[0].clientX - pointerDownEvents[1].clientX,
      //     pointerDownEvents[0].clientY - pointerDownEvents[1].clientY,
      //   );
      //   if (twoPointerZoomDiff > 0) {
      //     if (twoPointerZoomDiff > diff) {
      //       content_area_scale *= 1.1;
      //     } else if (twoPointerZoomDiff < diff) {
      //       content_area_scale *= 0.9;
      //     }
      //     const { x, y } = content_area.getBoundingClientRect();
      //     const x_mid =
      //       pointerDownEvents[0].clientX +
      //       (pointerDownEvents[1].clientX - pointerDownEvents[0].clientX) / 2;
      //     const y_mid =
      //       pointerDownEvents[0].clientY +
      //       (pointerDownEvents[1].clientY - pointerDownEvents[0].clientY) / 2;
      //     const transformOrigin = `${x_mid - x}px ${y_mid - y}px`;
      //     content_area.style.transformOrigin = transformOrigin;
      //     content_area.style.transform = `scale(${content_area_scale})`;
      //   }
      // }
    }
    function pointerUpHandler(e) {
      let pointerDownIndex = pointerDownEvents.findIndex((evt) => evt.pointerId === e.pointerId);
      pointerDownEvents.splice(pointerDownIndex, 1);
      if (pointerDownEvents.length < 2) {
        twoPointerZoomDiff = -1;
      }
      unfocus(e);
      focused_point_info = null;
      if (grabbed_item !== null) {
        grabbed_item.classList.remove("grabbing");
      }
    }
    function getContentClipboard() {
      navigator.clipboard.read().then((items) => {
        const images = items.filter((i) => {
          return i.types.some((t) => t.includes("image") || t.includes("text"));
        });
        images.forEach((i) => {
          const image_mime_type = i.types.find((t) => t.includes("image"));
          if (image_mime_type) {
            i.getType(image_mime_type).then((blob) => {
              const imageUrl = URL.createObjectURL(blob);
              const img = new Image();
              img.onpointerdown = setFocusedItem;
              img.classList.add("content-item");
              img.src = imageUrl;
              img.draggable = false;
              const content_area = document.querySelector(".content-area");
              content_area.appendChild(img);
            });
          }
          const text_plain_svg = i.types.find((t) => t === "text/plain");
          if (text_plain_svg) {
            i.getType(text_plain_svg).then((blob) => {
              blob.text().then((t) => {
                const d = new DOMParser();
                const parsedDocument = d.parseFromString(t, "image/svg+xml");
                if (!parsedDocument.querySelector("parsererror")) {
                  const svg = parsedDocument.documentElement.outerHTML;
                  const img = new Image();
                  img.onpointerdown = setFocusedItem;
                  img.classList.add("content-item");
                  img.src = `data:image/svg+xml;base64,${btoa(svg)}`;
                  img.draggable = false;
                  content_area.appendChild(img);
                } else {
                  throw Error("TODO");
                }
              });
            });
          }
        });
      });
    }
    const paste_btn = document.getElementById("paste-btn");
    paste_btn.onclick = getContentClipboard;
    document.addEventListener("paste", getContentClipboard);
    document.addEventListener("pointermove", pointerMoveHandler);
    document.addEventListener("pointerup", pointerUpHandler);
    document.addEventListener("pointerdown", pointerDownHandler);
    document.addEventListener("copy", async () => {
      if (focused_item) {
        navigator.clipboard.write([
          new ClipboardItem({
            "image/png": await fetch(focused_item.src)
              .then((r) => r.blob())
              .then((blob) => blob),
          }),
        ]);
      }
    });
    document.addEventListener(
      "wheel",
      (e) => {
        if (e.deltaMode === WheelEvent.DOM_DELTA_PIXEL) {
          e.preventDefault();
          const { x, y, width, height } = content_area.getBoundingClientRect();
          if (e.ctrlKey) {
            // zoom event
            // ctrlKey is true when zooming
            let scale = Math.sign(e.deltaY) === 1 ? 0.97 : 1.03;
            const diff_x = e.clientX - (x + width / 2);
            const diff_y = e.clientY - (y + height / 2);
            contentAreaMatrix.scaleSelf(scale, scale, scale, diff_x / contentAreaMatrix.a, diff_y / contentAreaMatrix.a);
            content_area.style.transform = contentAreaMatrix.toString();
          } else {
            // moving around event
            contentAreaMatrix.translateSelf(-e.deltaX, -e.deltaY);
            content_area.style.transform = contentAreaMatrix.toString();
          }
        }
      },
      { passive: false },
    );
  </script>
</html>
