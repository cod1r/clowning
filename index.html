<!doctype html>
<html>
  <style>
    body {
      height: 100vh;
      width: 100vw;
      box-sizing: border-box;
      position: relative;
      padding: 0;
      margin: 0;
      touch-action: none;
      overflow: hidden;
    }
    html {
      overflow: hidden;
    }
    button {
      padding: 8px;
      border: 2px solid black;
      border-radius: 5px;
      cursor: pointer;
      margin: 3px;
      font-size: 1.5em;
    }
    .content-item {
      position: absolute;
      cursor: grab;
      user-select: none;
      border: 2px solid black;
    }
    .toolbar {
      position: fixed;
      height: min-content;
      width: 100%;
      display: flex;
      justify-content: center;
      pointer-events: none;
      z-index: 1;
    }
    .toolbar * {
      pointer-events: all;
    }
    .content-area {
      position: relative;
      width: 100%;
      height: 100%;
    }
    .root {
      height: 100%;
      width: 100%;
    }
    .focused {
      border: 1px solid blue;
    }
    .grabbing {
      cursor: grabbing;
    }
  </style>
  <body>
    <div class="root">
      <div class="toolbar">
        <button id="paste-img-btn">paste img</button>
        <button id="add-txt-btn">add text</button>
        <button id="add-black-box">add black box</button>
      </div>
      <div class="content-area"></div>
    </div>
  </body>
  <script>
    let focused_item = null;
    let grabbed_item = null;
    let diff_to_subtract_to_maintain_element_offset = null;
    function setFocusedItem(e) {
      if (e.target.classList.contains("content-item")) {
        focused_item = e.target;
        grabbed_item = focused_item;
        focused_item.classList.add("focused");
        grabbed_item.classList.add("grabbing");
        let bbox = e.target.getBoundingClientRect();
        diff_to_subtract_to_maintain_element_offset = [e.clientX - bbox.x, e.clientY - bbox.y];
      }
    }
    function moveGrabbedItem(e) {
      if (diff_to_subtract_to_maintain_element_offset === null || grabbed_item === null) {
        return;
      }
      grabbed_item.style.transform = `translate(${e.clientX - diff_to_subtract_to_maintain_element_offset[0]}px, ${e.clientY - diff_to_subtract_to_maintain_element_offset[1]}px)`;
    }
    function pointerup(e) {
      if (grabbed_item !== null) {
        grabbed_item.classList.remove("grabbing");
        diff_to_subtract_to_maintain_element_offset = null;
      }
    }
    function getImageFromClipboard() {
      navigator.clipboard.read().then((items) => {
        const images = items.filter((i) => {
          return i.types.some((t) => t.includes("image"));
        });
        images.forEach((i) => {
          const image_mime_type = i.types.find((t) => t.includes("image"));
          i.getType(image_mime_type).then((blob) => {
            const imageUrl = URL.createObjectURL(blob);
            const img = new Image();
            img.onpointerdown = setFocusedItem;
            img.classList.add("content-item");
            img.src = imageUrl;
            img.draggable = false;
            const content_area = document.querySelector(".content-area");
            content_area.appendChild(img);
          });
        });
      });
    }
    const paste_img_btn = document.getElementById("paste-img-btn");
    paste_img_btn.onclick = getImageFromClipboard;
    document.addEventListener("paste", getImageFromClipboard);
    document.addEventListener("pointermove", moveGrabbedItem);
    document.addEventListener("pointerup", pointerup);
  </script>
</html>
