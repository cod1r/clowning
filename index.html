<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      height: 100vh;
      width: 100vw;
      position: relative;
      padding: 0;
      margin: 0;
      touch-action: none;
      overflow: hidden;
    }
    html {
      overflow: hidden;
    }
    button {
      padding: 8px;
      border: 2px solid black;
      border-radius: 5px;
      cursor: pointer;
      margin: 3px;
      font-size: 1.5em;
      color: black;
    }
    @media (max-width: 800px) {
      button {
        font-size: 1em;
      }
    }
    .content-item {
      position: absolute;
      cursor: grab;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }
    .toolbar {
      position: fixed;
      height: min-content;
      width: 100%;
      display: flex;
      justify-content: center;
      pointer-events: none;
      z-index: 1;
    }
    .toolbar * {
      pointer-events: all;
    }
    .content-area {
      position: absolute;
      width: 100%;
      height: 100%;
    }
    .root {
      height: 100%;
      width: 100%;
    }
    .focused {
      border: none;
    }
    .grabbing {
      cursor: grabbing !important;
    }
    .content-item-container {
      height: min-content;
      width: min-content;
    }
    .focus-ui-controls {
      pointer-events: all;
      user-select: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      cursor: grab;
      position: absolute;
      background-color: blue;
    }
  </style>
  <body>
    <div class="root">
      <div class="toolbar">
        <button id="paste-btn">paste</button>
        <button id="add-txt-btn">add text</button>
        <button id="add-black-box">add black box</button>
      </div>
      <div class="content-area"></div>
    </div>
  </body>
  <script>
    const root = document.querySelector(".root");
    const content_area = document.querySelector(".content-area");

    const scale1 = document.createElement("div");
    scale1.id = "scale1";
    scale1.style.height = "30px";
    scale1.style.width = "30px";

    const scale2 = document.createElement("div");
    scale2.id = "scale2";
    scale2.style.height = "30px";
    scale2.style.width = "30px";

    const scale3 = document.createElement("div");
    scale3.id = "scale3";
    scale3.style.height = "30px";
    scale3.style.width = "30px";

    const scale4 = document.createElement("div");
    scale4.id = "scale4";
    scale4.style.height = "30px";
    scale4.style.width = "30px";

    const horizontalRadius = 30;
    const verticalRadius = 30;
    const cssString = `${horizontalRadius}px ${verticalRadius}px`;
    scale1.style.borderTopLeftRadius = cssString;
    scale1.style.borderTopRightRadius = cssString;
    scale1.style.borderBottomLeftRadius = cssString;

    scale2.style.borderTopLeftRadius = cssString;
    scale2.style.borderTopRightRadius = cssString;
    scale2.style.borderBottomRightRadius = cssString;

    scale3.style.borderTopLeftRadius = cssString;
    scale3.style.borderBottomLeftRadius = cssString;
    scale3.style.borderBottomRightRadius = cssString;

    scale4.style.borderTopRightRadius = cssString;
    scale4.style.borderBottomLeftRadius = cssString;
    scale4.style.borderBottomRightRadius = cssString;

    let rotateFocusControl = document.createElement("div");
    rotateFocusControl.style.width = "25px";
    rotateFocusControl.style.height = "25px";
    rotateFocusControl.style.borderRadius = "30px 30px";

    let topFocusBorder = document.createElement("div");
    topFocusBorder.style.height = "2px";
    let leftFocusBorder = document.createElement("div");
    leftFocusBorder.style.width = "2px";
    let rightFocusBorder = document.createElement("div");
    rightFocusBorder.style.width = "2px";
    let bottomFocusBorder = document.createElement("div");
    bottomFocusBorder.style.height = "2px";

    scale1.classList.add("focus-ui-controls");
    scale2.classList.add("focus-ui-controls");
    scale3.classList.add("focus-ui-controls");
    scale4.classList.add("focus-ui-controls");
    rotateFocusControl.classList.add("focus-ui-controls");
    topFocusBorder.classList.add("focus-ui-controls");
    leftFocusBorder.classList.add("focus-ui-controls");
    rightFocusBorder.classList.add("focus-ui-controls");
    bottomFocusBorder.classList.add("focus-ui-controls");

    let focusItemRotation = 0;

    let selectedFocusUIControl = null;
    let diffFromCornerSelectedControl = null;

    let focused_item = null;

    scale1.onpointerdown = (e) => {
      if (focused_item === null) {
        return;
      }
      selectedFocusUIControl = scale1;
      const { x, y, width, height } = scale1.getBoundingClientRect();
      diffFromCornerSelectedControl = [e.clientX - (x + width), e.clientY - (y + height)];
    };
    scale2.onpointerdown = (e) => {
      if (focused_item === null) {
        return;
      }
      selectedFocusUIControl = scale2;
      const { x, y, width, height } = scale2.getBoundingClientRect();
      diffFromCornerSelectedControl = [e.clientX - x, e.clientY - (y + height)];
    };
    scale3.onpointerdown = (e) => {
      if (focused_item === null) {
        return;
      }
      selectedFocusUIControl = scale3;
      const { x, y, width, height } = scale3.getBoundingClientRect();
      diffFromCornerSelectedControl = [e.clientX - (x + width), e.clientY - y];
    };
    scale4.onpointerdown = (e) => {
      if (focused_item === null) {
        return;
      }
      selectedFocusUIControl = scale4;
      const { x, y, width, height } = scale4.getBoundingClientRect();
      diffFromCornerSelectedControl = [e.clientX - x, e.clientY - y];
    };
    let initial_rotate_focus_control_pos = null;
    rotateFocusControl.onpointerdown = (e) => {
      if (focused_item === null) {
        return;
      }
      selectedFocusUIControl = rotateFocusControl;
      const { x, y, width, height } = rotateFocusControl.getBoundingClientRect();
      initial_rotate_focus_control_pos = [x + width / 2, y + height / 2];
    };

    let grabbed_item = null;
    let focused_point_info = null;
    let contentAreaMatrix = new DOMMatrix();
    function addFocusControls() {
      root.appendChild(scale1);
      root.appendChild(scale2);
      root.appendChild(scale3);
      root.appendChild(scale4);
      root.appendChild(rotateFocusControl);
      root.appendChild(topFocusBorder);
      root.appendChild(bottomFocusBorder);
      root.appendChild(leftFocusBorder);
      root.appendChild(rightFocusBorder);
    }
    function removeFocusControls() {
      root.removeChild(scale1);
      root.removeChild(scale2);
      root.removeChild(scale3);
      root.removeChild(scale4);
      root.removeChild(rotateFocusControl);
      root.removeChild(topFocusBorder);
      root.removeChild(bottomFocusBorder);
      root.removeChild(leftFocusBorder);
      root.removeChild(rightFocusBorder);
    }
    function unfocus(e) {
      if (e.target !== focused_item) {
        if (focused_item && selectedFocusUIControl === null) {
          focused_item.classList.remove("focused");
          focused_item = null;
          grabbed_item = null;
          removeFocusControls();
        }
        diffFromCornerSelectedControl = null;
      }
      focused_point_info = null;
      selectedFocusUIControl = null;
    }
    function alignFocusControls() {
      if (focused_item !== null) {
        const { x, y, width, height } = focused_item.getBoundingClientRect();
        scale1.style.transform = `translate(${x - 30}px, ${y - 30}px)`;
        scale2.style.transform = `translate(${x + width}px, ${y - 30}px)`;
        scale3.style.transform = `translate(${x - 30}px, ${y + height}px)`;
        scale4.style.transform = `translate(${x + width}px, ${y + height}px)`;

        topFocusBorder.style.width = `${width}px`;
        topFocusBorder.style.transform = `translate(${x}px, ${y - 2}px)`;
        bottomFocusBorder.style.width = `${width}px`;
        bottomFocusBorder.style.transform = `translate(${x}px, ${y + height}px)`;
        leftFocusBorder.style.height = `${height}px`;
        leftFocusBorder.style.transform = `translate(${x - 2}px, ${y}px)`;
        rightFocusBorder.style.height = `${height}px`;
        rightFocusBorder.style.transform = `translate(${x + width}px, ${y}px)`;

        const rotateFocusDOMRect = rotateFocusControl.getBoundingClientRect();
        const rotateFocusXCenter = rotateFocusDOMRect.x + rotateFocusDOMRect.width / 2;
        const rotateFocusYCenter = rotateFocusDOMRect.y + rotateFocusDOMRect.height / 2;
        const rotateFocusMatrix = new DOMMatrix(getComputedStyle(rotateFocusControl).transform);
        const focusedMatrix = new DOMMatrix(getComputedStyle(focused_item).transform);
        const focusedItemHeight =
          (focused_item.naturalHeight / 2) * contentAreaMatrix.a * focusedMatrix.d + 40;
        const radianAngle = (focusItemRotation * Math.PI) / 180;
        const xPos = Math.cos(-radianAngle + Math.PI / 2) * focusedItemHeight;
        const yPos = -Math.sin(-radianAngle + Math.PI / 2) * focusedItemHeight;
        const rotatedXDiff = xPos + (x + width / 2);
        const rotatedYDiff = yPos + (y + height / 2);
        const translateXDiff = rotatedXDiff - rotateFocusXCenter;
        const translateYDiff = rotatedYDiff - rotateFocusYCenter;
        rotateFocusMatrix.translateSelf(translateXDiff, translateYDiff);
        rotateFocusControl.style.transform = rotateFocusMatrix.toString();
      }
    }
    function setFocusedItem(e) {
      if (e.target.classList.contains("content-item")) {
        unfocus(e);
        const node = e.target.parentNode.removeChild(e.target);
        content_area.appendChild(node);
        if (focused_item !== e.target) {
          focused_item = e.target;
          grabbed_item = focused_item;
          focused_item.classList.add("focused");
          addFocusControls();
        }
        alignFocusControls();
        grabbed_item.classList.add("grabbing");
        const bbox = grabbed_item.getBoundingClientRect();
        focused_point_info = { x: bbox.x, y: bbox.y, eventX: e.clientX, eventY: e.clientY };
      }
    }
    function pointerDownHandler(e) {
      setFocusedItem(e);
      if (e.target === selectedFocusUIControl) {
        selectedFocusUIControl.classList.add("grabbing");
      }
    }
    function moveGrabbedItem(e) {
      if (focused_point_info === null || grabbed_item === null) {
        return;
      }

      let grabbed_item_bbox = grabbed_item.getBoundingClientRect();
      let { x, y, eventX, eventY } = focused_point_info;
      let diff_x = eventX - (x + grabbed_item_bbox.width / 2);
      let diff_y = eventY - (y + grabbed_item_bbox.height / 2);

      // this is the scaleX; also scaleY must be the same
      let content_area_scale = contentAreaMatrix.a;

      const transform = getComputedStyle(grabbed_item).transform;
      const matrix = new DOMMatrix(transform);
      const originX = grabbed_item_bbox.x + grabbed_item_bbox.width / 2;
      const originY = grabbed_item_bbox.y + grabbed_item_bbox.height / 2;
      const tX = e.clientX - originX;
      const tY = e.clientY - originY;
      /*
      ISSUE: translateSelf doesn't consider the grabbed_item's rotation
      */
      const translateXAmt = (tX - diff_x) / content_area_scale / matrix.a;
      const translateYAmt = (tY - diff_y) / content_area_scale / matrix.d;
      const hypot = Math.hypot(translateXAmt, translateYAmt);
      if (translateXAmt !== 0 || translateYAmt !== 0) {
        const angleBeforeSign = Math.acos(translateXAmt / hypot);
        // because rotation on the web is clockwise, angles are going to have flipped signs
        const angle = angleBeforeSign * (translateYAmt === 0 ? 1 : -Math.sign(translateYAmt));
        const angle_between = focusItemRotation - (angle * 180) / Math.PI;
        const tx_amt = Math.cos((angle_between * Math.PI) / 180) * hypot;
        const ty_amt = Math.sin((angle_between * Math.PI) / 180) * hypot;
        matrix.translateSelf(tx_amt, ty_amt);
        console.log(angle, angleBeforeSign, angle_between, tx_amt, ty_amt);
        grabbed_item.style.transform = matrix.toString();
        alignFocusControls();
      }
    }
    function moveFocusUIControl(e) {
      if (selectedFocusUIControl !== null) {
        const transform = getComputedStyle(focused_item).transform;
        const matrix = new DOMMatrix(transform);
        const { x, y, width, height } = focused_item.getBoundingClientRect();
        if (selectedFocusUIControl === scale1) {
          const right = x + width;
          const bottom = y + height;
          const percentageX =
            Math.max(10, Math.abs(e.clientX - diffFromCornerSelectedControl[0] - right)) /
            focused_item.naturalWidth;
          const scaleX = percentageX / matrix.a / contentAreaMatrix.a;
          const percentageY =
            Math.max(10, Math.abs(e.clientY - diffFromCornerSelectedControl[1] - bottom)) /
            focused_item.naturalHeight;
          const scaleY = percentageY / matrix.d / contentAreaMatrix.a;
          matrix.scaleSelf(
            scaleX,
            scaleY,
            1,
            width / 2 / contentAreaMatrix.a / matrix.a,
            height / 2 / contentAreaMatrix.a / matrix.d,
          );
        } else if (selectedFocusUIControl === scale2) {
          const left = x;
          const bottom = y + height;
          const percentageX =
            Math.abs(e.clientX - diffFromCornerSelectedControl[0] - left) /
            focused_item.naturalWidth;
          const scaleX = percentageX / matrix.a / contentAreaMatrix.a;
          const percentageY =
            Math.abs(e.clientY - diffFromCornerSelectedControl[1] - bottom) /
            focused_item.naturalHeight;
          const scaleY = percentageY / matrix.d / contentAreaMatrix.a;
          matrix.scaleSelf(
            scaleX,
            scaleY,
            1,
            -width / 2 / contentAreaMatrix.a / matrix.a,
            height / 2 / contentAreaMatrix.a / matrix.d,
          );
        } else if (selectedFocusUIControl === scale3) {
          const right = x + width;
          const top = y;
          const percentageX =
            Math.abs(e.clientX - diffFromCornerSelectedControl[0] - right) /
            focused_item.naturalWidth;
          const scaleX = percentageX / matrix.a / contentAreaMatrix.a;
          const percentageY =
            Math.abs(e.clientY - diffFromCornerSelectedControl[1] - top) /
            focused_item.naturalHeight;
          const scaleY = percentageY / matrix.d / contentAreaMatrix.a;
          matrix.scaleSelf(
            scaleX,
            scaleY,
            1,
            width / 2 / contentAreaMatrix.a / matrix.a,
            -height / 2 / contentAreaMatrix.a / matrix.d,
          );
        } else if (selectedFocusUIControl === scale4) {
          const left = x;
          const top = y;
          const percentageX =
            Math.abs(e.clientX - diffFromCornerSelectedControl[0] - left) /
            focused_item.naturalWidth;
          const scaleX = percentageX / matrix.a / contentAreaMatrix.a;
          const percentageY =
            Math.abs(e.clientY - diffFromCornerSelectedControl[1] - top) /
            focused_item.naturalHeight;
          const scaleY = percentageY / matrix.d / contentAreaMatrix.a;
          matrix.scaleSelf(
            scaleX,
            scaleY,
            1,
            -width / 2 / contentAreaMatrix.a / matrix.a,
            -height / 2 / contentAreaMatrix.a / matrix.d,
          );
        } else if (selectedFocusUIControl === rotateFocusControl) {
          const rotateFocusControlBBox = selectedFocusUIControl.getBoundingClientRect();
          const diffx = e.clientX - (x + width / 2);
          const diffy = e.clientY - (y + height / 2);
          const old_pos_diffx = initial_rotate_focus_control_pos[0] - (x + width / 2);
          const old_pos_diffy = initial_rotate_focus_control_pos[1] - (y + height / 2);
          const hypot1 = Math.hypot(old_pos_diffx, old_pos_diffy);
          const hypot2 = Math.hypot(diffx, diffy);
          const angle1 =
            old_pos_diffx === 0
              ? 90
              : (180 / Math.PI) * Math.acos(old_pos_diffx / hypot1) * Math.sign(old_pos_diffy);
          const angle2 =
            diffx === 0 ? 90 : (180 / Math.PI) * Math.acos(diffx / hypot2) * Math.sign(diffy);
          const angle_diff = angle2 - angle1;

          focusItemRotation += angle_diff;
          focusItemRotation = focusItemRotation > 360 ? focusItemRotation - 360 : focusItemRotation;

          matrix.rotateSelf(angle_diff);

          const diffX_rotateToContentCenter =
            rotateFocusControlBBox.x + rotateFocusControlBBox.width / 2 - (x + width / 2);
          const diffY_rotateToContentCenter =
            rotateFocusControlBBox.y + rotateFocusControlBBox.height / 2 - (y + height / 2);

          const rotateFocusMatrix = new DOMMatrix(getComputedStyle(rotateFocusControl).transform);
          rotateFocusMatrix.rotateAxisAngleSelf(
            diffX_rotateToContentCenter,
            diffY_rotateToContentCenter,
            1,
            angle_diff,
          );
          rotateFocusControl.style.transform = rotateFocusMatrix.toString();
        }
        focused_item.style.transform = matrix.toString();
        alignFocusControls();
      }
    }
    function pointerMoveHandler(e) {
      moveFocusUIControl(e);
      moveGrabbedItem(e);
    }
    function pointerUpHandler(e) {
      if (grabbed_item !== null) {
        grabbed_item.classList.remove("grabbing");
      }
      if (selectedFocusUIControl !== null) {
        selectedFocusUIControl.classList.remove("grabbing");
        initial_rotate_focus_control_pos = null;
      }
      unfocus(e);
    }
    function getContentClipboard() {
      navigator.clipboard.read().then((items) => {
        const images = items.filter((i) => {
          return i.types.some((t) => t.includes("image") || t.includes("text"));
        });
        images.forEach((i) => {
          const image_mime_type = i.types.find((t) => t.includes("image"));
          if (image_mime_type) {
            i.getType(image_mime_type).then((blob) => {
              const imageUrl = URL.createObjectURL(blob);
              const img = new Image();
              img.classList.add("content-item");
              img.src = imageUrl;
              img.draggable = false;
              img.decode().then(() => {
                content_area.appendChild(img);
              });
            });
          }
          const text_plain_svg = i.types.find((t) => t === "text/plain");
          if (text_plain_svg) {
            i.getType(text_plain_svg).then((blob) => {
              blob.text().then((t) => {
                const d = new DOMParser();
                const parsedDocument = d.parseFromString(t, "image/svg+xml");
                if (!parsedDocument.querySelector("parsererror")) {
                  const svg = parsedDocument.documentElement.outerHTML;
                  const img = new Image();
                  img.onpointerdown = setFocusedItem;
                  img.classList.add("content-item");
                  img.src = `data:image/svg+xml;base64,${btoa(svg)}`;
                  img.draggable = false;
                  img.decode().then(() => {
                    content_area.appendChild(img);
                  });
                } else {
                  throw Error("TODO");
                }
              });
            });
          }
        });
      });
    }
    const paste_btn = document.getElementById("paste-btn");
    paste_btn.onclick = getContentClipboard;
    document.addEventListener("paste", getContentClipboard);
    document.addEventListener("pointermove", pointerMoveHandler);
    document.addEventListener("pointerup", pointerUpHandler);
    document.addEventListener("pointerdown", pointerDownHandler);
    document.addEventListener("copy", async () => {
      if (focused_item) {
        navigator.clipboard.write([
          new ClipboardItem({
            "image/png": await fetch(focused_item.src)
              .then((r) => r.blob())
              .then((blob) => blob),
          }),
        ]);
      }
    });
    document.addEventListener(
      "wheel",
      (e) => {
        if (e.deltaMode === WheelEvent.DOM_DELTA_PIXEL) {
          e.preventDefault();
          const { x, y, width, height } = content_area.getBoundingClientRect();
          if (e.ctrlKey) {
            // zoom event
            // ctrlKey is true when zooming
            let scale = Math.sign(e.deltaY) === 1 ? 0.97 : 1.03;
            const diff_x = e.clientX - (x + width / 2);
            const diff_y = e.clientY - (y + height / 2);
            contentAreaMatrix.scaleSelf(
              scale,
              scale,
              scale,
              diff_x / contentAreaMatrix.a,
              diff_y / contentAreaMatrix.a,
            );
          } else {
            // moving around event
            contentAreaMatrix.translateSelf(-e.deltaX, -e.deltaY);
          }
          content_area.style.transform = contentAreaMatrix.toString();
          alignFocusControls();
        }
      },
      { passive: false },
    );
  </script>
</html>
