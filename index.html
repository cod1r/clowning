<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      height: 100vh;
      width: 100vw;
      position: relative;
      padding: 0;
      margin: 0;
      touch-action: none;
      overflow: hidden;
    }
    html {
      overflow: hidden;
    }
    button {
      padding: 8px;
      border: 2px solid black;
      border-radius: 5px;
      cursor: pointer;
      margin: 3px;
      font-size: 1.5em;
      color: black;
    }
    @media (max-width: 800px) {
      button {
        font-size: 1em;
      }
    }
    .content-item {
      position: absolute;
      cursor: grab;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      outline: 2px solid black;
    }
    .toolbar {
      position: fixed;
      height: min-content;
      width: 100%;
      display: flex;
      justify-content: center;
      pointer-events: none;
      z-index: 1;
    }
    .toolbar * {
      pointer-events: all;
    }
    .content-area {
      position: relative;
      width: 100%;
      height: 100%;
    }
    .root {
      height: 100%;
      width: 100%;
    }
    .focused {
      border: none;
      outline: 3px solid blue;
    }
    .grabbing {
      cursor: grabbing;
    }
    .content-item-container {
      height: min-content;
      width: min-content;
    }
    .focus-ui-controls {
      pointer-events: all;
      user-select: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      cursor: grab;
    }
  </style>
  <body>
    <div class="root">
      <div class="toolbar">
        <button id="paste-btn">paste</button>
        <button id="add-txt-btn">add text</button>
        <button id="add-black-box">add black box</button>
      </div>
      <div class="content-area"></div>
    </div>
  </body>
  <script>
    const content_area = document.querySelector(".content-area");
    const focusContainer = document.createElement("div");
    const contents = [];
    focusContainer.id = "focus_container";
    focusContainer.style.pointerEvents = "none";
    focusContainer.style.position = "absolute";

    const scale1 = document.createElement("div");
    scale1.id = "scale1";
    scale1.style.position = "absolute";
    scale1.style.top = "-30px";
    scale1.style.left = "-30px";
    scale1.style.height = "30px";
    scale1.style.width = "30px";
    scale1.style.backgroundColor = "blue";

    const scale2 = document.createElement("div");
    scale2.id = "scale2";
    scale2.style.position = "absolute";
    scale2.style.top = "-30px";
    scale2.style.right = "-30px";
    scale2.style.height = "30px";
    scale2.style.width = "30px";
    scale2.style.backgroundColor = "blue";

    const scale3 = document.createElement("div");
    scale3.id = "scale3";
    scale3.style.position = "absolute";
    scale3.style.bottom = "-30px";
    scale3.style.left = "-30px";
    scale3.style.height = "30px";
    scale3.style.width = "30px";
    scale3.style.backgroundColor = "blue";

    const scale4 = document.createElement("div");
    scale4.id = "scale4";
    scale4.style.position = "absolute";
    scale4.style.bottom = "-30px";
    scale4.style.right = "-30px";
    scale4.style.height = "30px";
    scale4.style.width = "30px";
    scale4.style.backgroundColor = "blue";

    scale1.classList.add("focus-ui-controls");
    scale2.classList.add("focus-ui-controls");
    scale3.classList.add("focus-ui-controls");
    scale4.classList.add("focus-ui-controls");

    scale1.style.borderTopLeftRadius = "30px";
    scale1.style.borderTopRightRadius = "30px";
    scale1.style.borderBottomLeftRadius = "30px";

    focusContainer.appendChild(scale1);
    focusContainer.appendChild(scale2);
    focusContainer.appendChild(scale3);
    focusContainer.appendChild(scale4);

    let selectedScale = null;
    let diffFromCornerSelectedScale = null;

    let focused_item = null;

    scale1.onpointerdown = (e) => {
      if (!focusContainer.checkVisibility()) {
        return;
      }
      selectedScale = scale1;
      const { x, y, width, height } = scale1.getBoundingClientRect();
      diffFromCornerSelectedScale = [e.clientX - (x + width), e.clientY - (y + height)];
    };
    scale2.onpointerdown = (e) => {
      if (!focusContainer.checkVisibility()) {
        return;
      }
      selectedScale = scale2;
      const { x, y, width, height } = scale2.getBoundingClientRect();
      diffFromCornerSelectedScale = [e.clientX - x, e.clientY - (y + height)];
    };
    scale3.onpointerdown = (e) => {
      if (!focusContainer.checkVisibility()) {
        return;
      }
      selectedScale = scale3;
      const { x, y, width, height } = scale3.getBoundingClientRect();
      diffFromCornerSelectedScale = [e.clientX - (x + width), e.clientY - y];
    };
    scale4.onpointerdown = (e) => {
      if (!focusContainer.checkVisibility()) {
        return;
      }
      selectedScale = scale4;
      const { x, y, width, height } = scale4.getBoundingClientRect();
      diffFromCornerSelectedScale = [e.clientX - x, e.clientY - y];
    };

    let grabbed_item = null;
    let focused_point_info = null;
    let contentAreaMatrix = new DOMMatrix();
    function unfocus(e) {
      if (e.target !== focused_item) {
        if (focused_item && selectedScale === null) {
          focused_item.classList.remove("focused");
          focusContainer.remove();
          focused_item = null;
          grabbed_item = null;
          focused_point_info = null;
        }
      }
    }
    function removeScalingFromFocusControls() {
      const transform = getComputedStyle(focusContainer).transform;
      const matrix = new DOMMatrix(transform);
      scale1.style.width = `${30 / contentAreaMatrix.a / matrix.a}px`;
      scale1.style.height = `${30 / contentAreaMatrix.a / matrix.d}px`;
      scale1.style.left = `${-30 / contentAreaMatrix.a / matrix.a}px`;
      scale1.style.top = `${-30 / contentAreaMatrix.a / matrix.d}px`;

      scale2.style.width = `${30 / contentAreaMatrix.a / matrix.a}px`;
      scale2.style.height = `${30 / contentAreaMatrix.a / matrix.d}px`;
      scale2.style.right = `${-30 / contentAreaMatrix.a / matrix.a}px`;
      scale2.style.top = `${-30 / contentAreaMatrix.a / matrix.d}px`;

      scale3.style.width = `${30 / contentAreaMatrix.a / matrix.a}px`;
      scale3.style.height = `${30 / contentAreaMatrix.a / matrix.d}px`;
      scale3.style.left = `${-30 / contentAreaMatrix.a / matrix.a}px`;
      scale3.style.bottom = `${-30 / contentAreaMatrix.a / matrix.d}px`;

      scale4.style.width = `${30 / contentAreaMatrix.a / matrix.a}px`;
      scale4.style.height = `${30 / contentAreaMatrix.a / matrix.d}px`;
      scale4.style.right = `${-30 / contentAreaMatrix.a / matrix.a}px`;
      scale4.style.bottom = `${-30 / contentAreaMatrix.a / matrix.d}px`;

      const horizontalRadius = 30 / contentAreaMatrix.a / matrix.a;
      const verticalRadius = 30 / contentAreaMatrix.a / matrix.d;
      const cssString = `${horizontalRadius}px ${verticalRadius}px`;
      scale1.style.borderTopLeftRadius = cssString;
      scale1.style.borderTopRightRadius = cssString;
      scale1.style.borderBottomLeftRadius = cssString;

      scale2.style.borderTopLeftRadius = cssString;
      scale2.style.borderTopRightRadius = cssString;
      scale2.style.borderBottomRightRadius = cssString;

      scale3.style.borderTopLeftRadius = cssString;
      scale3.style.borderBottomLeftRadius = cssString;
      scale3.style.borderBottomRightRadius = cssString;

      scale4.style.borderTopRightRadius = cssString;
      scale4.style.borderBottomLeftRadius = cssString;
      scale4.style.borderBottomRightRadius = cssString;
    }
    function setFocusedItem(e) {
      if (e.target.classList.contains("content-item")) {
        unfocus(e);
        const node = e.target.parentNode.removeChild(e.target);
        content_area.appendChild(node);
        if (focused_item !== e.target) {
          focused_item = e.target;
          grabbed_item = focused_item;
          focused_item.classList.add("focused");
          focusContainer.style.width = `${focused_item.width}px`;
          focusContainer.style.height = `${focused_item.height}px`;
          content_area.appendChild(focusContainer);
        }
        grabbed_item.classList.add("grabbing");
        let bbox = e.target.getBoundingClientRect();
        focused_point_info = { x: bbox.x, y: bbox.y, eventX: e.clientX, eventY: e.clientY };
        const transform = getComputedStyle(focused_item).transform;
        const matrix = new DOMMatrix(transform);
        focusContainer.style.transform = matrix.toString();
        removeScalingFromFocusControls();
      }
    }
    function pointerDownHandler(e) {
      setFocusedItem(e);
      if (e.target === selectedScale) {
        selectedScale.classList.add("grabbing");
      }
    }
    function moveGrabbedItem(e) {
      if (focused_point_info === null || grabbed_item === null) {
        return;
      }

      let grabbed_item_bbox = grabbed_item.getBoundingClientRect();
      let { x, y, eventX, eventY } = focused_point_info;
      let diff_x = eventX - (x + grabbed_item_bbox.width / 2);
      let diff_y = eventY - (y + grabbed_item_bbox.height / 2);

      // this is the scaleX; also scaleY must be the same
      let content_area_scale = contentAreaMatrix.a;

      const transform = getComputedStyle(grabbed_item).transform;
      const matrix = new DOMMatrix(transform);
      const originX = grabbed_item_bbox.x + grabbed_item_bbox.width / 2;
      const originY = grabbed_item_bbox.y + grabbed_item_bbox.height / 2;
      const tX = e.clientX - originX;
      const tY = e.clientY - originY;
      matrix.translateSelf(
        (tX - diff_x) / content_area_scale / matrix.a,
        (tY - diff_y) / content_area_scale / matrix.d,
      );
      grabbed_item.style.transform = matrix.toString();
      focusContainer.style.transform = matrix.toString();
    }
    function moveFocusUIControl(e) {
      if (selectedScale !== null) {
        const transform = getComputedStyle(focused_item).transform;
        const matrix = new DOMMatrix(transform);
        const { x, y, width, height } = focused_item.getBoundingClientRect();
        if (selectedScale === scale1) {
          const right = x + width;
          const bottom = y + height;
          const percentageX =
            Math.abs(e.clientX - diffFromCornerSelectedScale[0] - right) /
            focused_item.naturalWidth;
          const scaleX = percentageX / matrix.a / contentAreaMatrix.a;
          const percentageY =
            Math.abs(e.clientY - diffFromCornerSelectedScale[1] - bottom) /
            focused_item.naturalHeight;
          const scaleY = percentageY / matrix.d / contentAreaMatrix.a;
          matrix.scaleSelf(
            scaleX,
            scaleY,
            1,
            width / 2 / contentAreaMatrix.a / matrix.a,
            height / 2 / contentAreaMatrix.a / matrix.d,
          );
        } else if (selectedScale === scale2) {
          const left = x;
          const bottom = y + height;
          const percentageX =
            Math.abs(e.clientX - diffFromCornerSelectedScale[0] - left) / focused_item.naturalWidth;
          const scaleX = percentageX / matrix.a / contentAreaMatrix.a;
          const percentageY =
            Math.abs(e.clientY - diffFromCornerSelectedScale[1] - bottom) /
            focused_item.naturalHeight;
          const scaleY = percentageY / matrix.d / contentAreaMatrix.a;
          matrix.scaleSelf(
            scaleX,
            scaleY,
            1,
            -width / 2 / contentAreaMatrix.a / matrix.a,
            height / 2 / contentAreaMatrix.a / matrix.d,
          );
        } else if (selectedScale === scale3) {
          const right = x + width;
          const top = y;
          const percentageX =
            Math.abs(e.clientX - diffFromCornerSelectedScale[0] - right) /
            focused_item.naturalWidth;
          const scaleX = percentageX / matrix.a / contentAreaMatrix.a;
          const percentageY =
            Math.abs(e.clientY - diffFromCornerSelectedScale[1] - top) / focused_item.naturalHeight;
          const scaleY = percentageY / matrix.d / contentAreaMatrix.a;
          matrix.scaleSelf(
            scaleX,
            scaleY,
            1,
            width / 2 / contentAreaMatrix.a / matrix.a,
            -height / 2 / contentAreaMatrix.a / matrix.d,
          );
        } else if (selectedScale === scale4) {
          const left = x;
          const top = y;
          const percentageX =
            Math.abs(e.clientX - diffFromCornerSelectedScale[0] - left) / focused_item.naturalWidth;
          const scaleX = percentageX / matrix.a / contentAreaMatrix.a;
          const percentageY =
            Math.abs(e.clientY - diffFromCornerSelectedScale[1] - top) / focused_item.naturalHeight;
          const scaleY = percentageY / matrix.d / contentAreaMatrix.a;
          matrix.scaleSelf(
            scaleX,
            scaleY,
            1,
            -width / 2 / contentAreaMatrix.a / matrix.a,
            -height / 2 / contentAreaMatrix.a / matrix.d,
          );
        }
        focused_item.style.transform = matrix.toString();
        focusContainer.style.transform = matrix.toString();
        removeScalingFromFocusControls();
      }
    }
    function pointerMoveHandler(e) {
      moveFocusUIControl(e);
      moveGrabbedItem(e);
    }
    function pointerUpHandler(e) {
      unfocus(e);
      selectedScale = null;
      diffFromCornerSelectedScale = null;
      focused_point_info = null;
      if (grabbed_item !== null) {
        grabbed_item.classList.remove("grabbing");
      }
      if (selectedScale !== null) {
        selectedScale.classList.remove("grabbing");
      }
    }
    function getContentClipboard() {
      navigator.clipboard.read().then((items) => {
        const images = items.filter((i) => {
          return i.types.some((t) => t.includes("image") || t.includes("text"));
        });
        images.forEach((i) => {
          const image_mime_type = i.types.find((t) => t.includes("image"));
          if (image_mime_type) {
            i.getType(image_mime_type).then((blob) => {
              const imageUrl = URL.createObjectURL(blob);
              const img = new Image();
              img.classList.add("content-item");
              img.src = imageUrl;
              img.draggable = false;
              img.decode().then(() => {
                content_area.appendChild(img);
              });
            });
          }
          const text_plain_svg = i.types.find((t) => t === "text/plain");
          if (text_plain_svg) {
            i.getType(text_plain_svg).then((blob) => {
              blob.text().then((t) => {
                const d = new DOMParser();
                const parsedDocument = d.parseFromString(t, "image/svg+xml");
                if (!parsedDocument.querySelector("parsererror")) {
                  const svg = parsedDocument.documentElement.outerHTML;
                  const img = new Image();
                  img.onpointerdown = setFocusedItem;
                  img.classList.add("content-item");
                  img.src = `data:image/svg+xml;base64,${btoa(svg)}`;
                  img.draggable = false;
                  img.decode().then(() => {
                    content_area.appendChild(img);
                  });
                } else {
                  throw Error("TODO");
                }
              });
            });
          }
        });
      });
    }
    const paste_btn = document.getElementById("paste-btn");
    paste_btn.onclick = getContentClipboard;
    document.addEventListener("paste", getContentClipboard);
    document.addEventListener("pointermove", pointerMoveHandler);
    document.addEventListener("pointerup", pointerUpHandler);
    document.addEventListener("pointerdown", pointerDownHandler);
    document.addEventListener("copy", async () => {
      if (focused_item) {
        navigator.clipboard.write([
          new ClipboardItem({
            "image/png": await fetch(focused_item.src)
              .then((r) => r.blob())
              .then((blob) => blob),
          }),
        ]);
      }
    });
    document.addEventListener(
      "wheel",
      (e) => {
        if (e.deltaMode === WheelEvent.DOM_DELTA_PIXEL) {
          e.preventDefault();
          const { x, y, width, height } = content_area.getBoundingClientRect();
          if (e.ctrlKey) {
            // zoom event
            // ctrlKey is true when zooming
            let scale = Math.sign(e.deltaY) === 1 ? 0.97 : 1.03;
            const diff_x = e.clientX - (x + width / 2);
            const diff_y = e.clientY - (y + height / 2);
            contentAreaMatrix.scaleSelf(
              scale,
              scale,
              scale,
              diff_x / contentAreaMatrix.a,
              diff_y / contentAreaMatrix.a,
            );
            content_area.style.transform = contentAreaMatrix.toString();
            removeScalingFromFocusControls();
          } else {
            // moving around event
            contentAreaMatrix.translateSelf(-e.deltaX, -e.deltaY);
            content_area.style.transform = contentAreaMatrix.toString();
          }
        }
      },
      { passive: false },
    );
  </script>
</html>
