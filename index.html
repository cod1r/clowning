<!doctype html>
<html>
  <style>
    body {
      height: 100vh;
      width: 100vw;
      box-sizing: border-box;
      position: relative;
      padding: 0;
      margin: 0;
    }
    button {
      padding: 8px;
      border: 2px solid black;
      border-radius: 5px;
      cursor: pointer;
      margin: 3px;
      font-size: 1.5em;
    }
    .content-item {
      position: absolute;
      cursor: grab;
    }
    .toolbar {
      position: fixed;
      height: min-content;
      width: 100%;
      display: flex;
      justify-content: center;
      pointer-events: none;
      z-index: 1;
    }
    .toolbar * {
      pointer-events: all;
    }
    .content-area {
      position: relative;
      width: 100%;
      height: 100%;
    }
    .root {
        height: 100%;
        width: 100%;
    }
  </style>
  <body>
      <div class="root">
          <div class="toolbar">
            <button id="paste-img-btn">paste img</button>
            <button id="add-txt-btn">add text</button>
            <button id="add-black-box">add black box</button>
          </div>
          <div class="content-area"></div>
      </div>
  </body>
  <script>
    let focused_item = null;
    const z_indexes = [0, 1, 2, 3, 4];
    const paste_img_btn = document.getElementById("paste-img-btn");
    paste_img_btn.onclick = (e) => {
      navigator.clipboard.read().then((items) => {
        const images = items.filter((i) => {
          return i.types.some((t) => t.includes("image"));
        });
        images.forEach((i) => {
          const image_mime_type = i.types.find((t) => t.includes("image"));
          i.getType(image_mime_type).then((blob) => {
            const imageUrl = URL.createObjectURL(blob);
            const img = new Image();
            img.classList.add("content-item");
            img.src = imageUrl;
            img.draggable = false;
            const content_area = document.querySelector(".content-area");
            content_area.appendChild(img);
          });
        });
      });
    };
  </script>
</html>
